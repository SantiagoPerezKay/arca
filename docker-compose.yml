services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: arca
      POSTGRES_USER: arca
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arca_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arca"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://arca:${POSTGRES_PASSWORD:-arca_secret_2024}@db:5432/arca
      SECRET_KEY: ${SECRET_KEY:-cambiar-en-produccion-clave-segura}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - certs_data:/app/certs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  certs_data:
